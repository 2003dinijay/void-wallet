name: Void Wallet CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install bcrypt

      - name: Check backend starts
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: voidwallet
          JWT_SECRET: test-secret-key
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: 1440
        run: |
          cd backend
          python -c "import main; print('Backend OK')"

      # ✅ IaC Validation Step (Added)
      - name: Validate Infrastructure
        run: echo "Checking infrastructure configuration..."

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build


  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    needs: [backend, frontend]

    steps:
      - name: Deploy to staging
        run: echo "Deploying Void Wallet to staging..."

      - name: Deploy to production
        run: echo "Deploying Void Wallet to production..."
